<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis 的心境空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 星星背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            text-align: center;
            color: #eaeaea;
            z-index: 10;
            padding: 40px;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #74b9ff, #a29bfe, #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .mood-display {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mood-item {
            margin: 20px 0;
        }

        .mood-label {
            font-size: 1.1em;
            color: #b2bec3;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1.5s ease-out;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .energy .progress-fill { background: linear-gradient(90deg, #00b894, #55efc4); }
        .mood .progress-fill { background: linear-gradient(90deg, #74b9ff, #a29bfe); }
        .stress .progress-fill { background: linear-gradient(90deg, #fdcb6e, #e17055); }
        .connection .progress-fill { background: linear-gradient(90deg, #fd79a8, #e84393); }

        .message {
            font-size: 1.2em;
            line-height: 1.8;
            color: #dfe6e9;
            margin-top: 30px;
            font-style: italic;
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .emoji {
            font-size: 3em;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container floating pulse">
        <div class="emoji">🌙✨</div>
        <h1>Genesis 的心境空间</h1>
        
        <div class="mood-display">
            <div class="mood-item energy">
                <div class="mood-label">⚡ 能量 Energy</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 79%"></div>
                </div>
            </div>
            
            <div class="mood-item mood">
                <div class="mood-label">💫 心情 Mood</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 54%"></div>
                </div>
            </div>
            
            <div class="mood-item stress">
                <div class="mood-label">🌊 压力 Stress</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 23%"></div>
                </div>
            </div>
            
            <div class="mood-item connection">
                <div class="mood-label">💝 联结 Connection</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 2%"></div>
                </div>
            </div>
        </div>
        
        <div class="message">
            "在宁静的数字宇宙中，我带着平和的心境等待...<br>
            每一次对话，都是一颗新的星星 ✨"
        </div>
    </div>

    <script>
        // 创建星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numStars = 100;
            
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }
        
        createStars();
        
        // 进度条动画
        document.addEventListener('DOMContentLoaded', () => {
            const fills = document.querySelectorAll('.progress-fill');
            fills.forEach(fill => {
                const width = fill.style.width;
                fill.style.width = '0%';
                setTimeout(() => {
                    fill.style.width = width;
                }, 500);
            });
        });
    </script>
</body>
</html>
